    #   build:
    #     context: ./agm-extractor-frontend/
    #     dockerfile: Dockerfile
    #   container_name: agm_frontend
    #   ports:
    #     - "3001:3001"
    # depends_on:
    #   - backend

volumes:
  pgdata:
