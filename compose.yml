services:
  database:
    image: postgres:15-alpine
    container_name: agm_database
    environment:
      - DATABASE_NAME=extractor_db
      - DATABASE_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./agm-extractor-backend/
      dockerfile: Dockerfile
    container_name: agm_backend
    environment:
      - DATABASE_URL=postgres://postgres:password@database:5432/extractor_db?schema=public
      - BETTER_AUTH_URL=http://localhost:3000
      - BETTER_AUTH_SECRET=b86a96bc778e902bf02ceb24e6118896be54b38ab97c349af8741a337e352cc6
    ports:
      - "3000:3000"
    depends_on:
      - database


    # NOTE: The frontend service is commented out for now. not exist yet  
